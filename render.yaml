# Blueprint do Render (https://render.com/docs/blueprint-spec)
# Suba este repositorio no Render como "Blueprint" e configure o DATABASE_URL
# (string de conexao do Neon) nas variaveis de ambiente do servico.
services:
  - type: web
    name: bzr-gestao-publica
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ORTHO_TILE_URL
        sync: false
      # Senha da pagina de importacao (/importar). Recomendado definir em producao.
      - key: IMPORT_TOKEN
        sync: false
      # Mude para "true" para carregar a cidade de demonstracao no primeiro deploy
      # (somente se o banco estiver vazio). Use "false" com dados reais.
      - key: SEED_DEMO
        value: "false"
      # Mude para "true" para carregar O.S. de demonstracao (Joao Pessoa) no boot,
      # se ainda nao houver nenhuma. Util para apresentar o modulo /os ao cliente.
      - key: SEED_OS_DEMO
        value: "false"
      # Login desligado por padrao (modulos abertos). Mude para "true" para
      # exigir login e aplicar os 3 perfis (admin/coordenador/tecnico).
      - key: AUTH_ENABLED
        value: "false"
      # Autenticacao (usada so quando AUTH_ENABLED=true): segredo dos tokens.
      - key: AUTH_SECRET
        generateValue: true
      # Admin criado no primeiro boot. Troque a senha depois de entrar.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Mude para "true" para carregar demandas de demonstracao no boot.
      - key: SEED_DEMANDAS_DEMO
        value: "false"
      # Mude para "true" para carregar BCIs de demonstracao no boot.
      - key: SEED_BCI_DEMO
        value: "false"
      - key: NODE_VERSION
        value: "22"
