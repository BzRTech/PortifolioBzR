<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/bzr-mark.svg" type="image/svg+xml" />
  <title>BzR — Gestão de Demandas</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    body { overflow: auto; display: block; }
    .topbar2 {
      position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: 12px;
      padding: 12px 18px; background: var(--bg-elev); border-bottom: 1px solid var(--line);
    }
    .topbar2 .brand { display: flex; align-items: center; gap: 10px; }
    .topbar2 .brand img { width: 34px; height: 34px; }
    .topbar2 .brand strong { font-size: 15px; font-weight: 800; }
    .topbar2 .brand .accent { color: var(--brand); }
    .topbar2 .brand small { display: block; color: var(--text-dim); font-size: 10.5px; }
    .spacer { flex: 1; }
    .navlink { color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600; padding: 7px 10px; border-radius: 8px; }
    .navlink:hover { background: var(--bg-elev-2); color: var(--text); }
    .userchip { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
    .avatar { width: 30px; height: 30px; border-radius: 50%; display: grid; place-items: center; font-weight: 800; font-size: 12px; color: var(--brand-ink); background: var(--accent); }
    .btn2 { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--text); border-radius: 9px; padding: 8px 12px; font-size: 13px; font-weight: 600; }
    .btn2:hover { border-color: var(--accent); }
    .btn2.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--brand-ink); border-color: transparent; font-weight: 700; }

    .wrap { padding: 16px 18px 60px; max-width: 1400px; margin: 0 auto; }
    .resumo { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .stat { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px; padding: 10px 14px; min-width: 120px; }
    .stat .v { font-size: 22px; font-weight: 800; }
    .stat .l { font-size: 11px; color: var(--text-dim); }
    .stat.alerta .v { color: #f6a94a; }
    .stat.minhas .v { color: var(--accent); }

    .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
    .views { display: flex; gap: 4px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 10px; padding: 3px; }
    .views button { border: none; background: transparent; color: var(--text-dim); font-weight: 600; font-size: 13px; padding: 7px 12px; border-radius: 8px; cursor: pointer; }
    .views button.on { background: var(--bg-elev-2); color: var(--text); }
    select.filtro { background: var(--bg-elev); color: var(--text); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font-size: 13px; }

    /* Kanban */
    .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
    @media (max-width: 900px) { .kanban { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 560px) { .kanban { grid-template-columns: 1fr; } }
    .col { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px; padding: 10px; min-height: 120px; }
    .col.drag-over { border-color: var(--accent); background: rgba(31,191,99,.05); }
    .col-head { display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); margin-bottom: 10px; padding: 0 4px; }
    .col-head .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .col-count { background: var(--bg-elev-2); border-radius: 20px; padding: 1px 8px; font-size: 11px; }

    /* Cards */
    .dcard { background: var(--bg-elev-2); border: 1px solid var(--line); border-left: 3px solid var(--line); border-radius: 10px; padding: 11px 12px; margin-bottom: 9px; cursor: grab; }
    .dcard:hover { border-color: var(--accent); }
    .dcard.p-urgente { border-left-color: #ef6c60; }
    .dcard.p-alta { border-left-color: #f6a94a; }
    .dcard.p-media { border-left-color: #7fb5f0; }
    .dcard.p-baixa { border-left-color: #6ee7a8; }
    .dcard .tit { font-size: 13.5px; font-weight: 700; margin-bottom: 6px; line-height: 1.3; }
    .dcard .meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .tag { font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .tag.equipe { background: var(--bg-elev); border: 1px solid var(--line); color: var(--text-dim); }
    .tag.prio-urgente { background: rgba(192,57,43,.18); color: #ef6c60; }
    .tag.prio-alta { background: rgba(245,169,74,.16); color: #f6a94a; }
    .tag.prio-media { background: rgba(59,130,246,.16); color: #7fb5f0; }
    .tag.prio-baixa { background: rgba(31,191,99,.15); color: #6ee7a8; }
    .prazo { font-size: 11px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 4px; }
    .prazo.atrasado { color: #ef6c60; font-weight: 700; }
    .resp-row { display: flex; gap: -6px; margin-top: 8px; }
    .resp { width: 22px; height: 22px; border-radius: 50%; background: var(--bg-elev); border: 1px solid var(--line); display: grid; place-items: center; font-size: 10px; font-weight: 800; color: var(--text); margin-right: -6px; }
    .lote-ref { font-size: 11px; color: var(--text-dim); margin-top: 6px; }

    /* Lista */
    table.lista { width: 100%; border-collapse: collapse; font-size: 13px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    table.lista th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); padding: 10px 12px; border-bottom: 1px solid var(--line); }
    table.lista td { padding: 10px 12px; border-bottom: 1px solid var(--line); }
    table.lista tr:last-child td { border-bottom: none; }
    table.lista tr { cursor: pointer; }
    table.lista tr:hover td { background: var(--bg-elev-2); }
    .st-pill { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
    .st-pendente { background: var(--bg-elev-2); color: var(--text-dim); }
    .st-em_andamento { background: rgba(245,169,74,.16); color: #f6a94a; }
    .st-concluida { background: rgba(31,191,99,.15); color: #6ee7a8; }
    .st-cancelada { background: rgba(192,57,43,.18); color: #ef6c60; }

    /* Calendário */
    .cal { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal .dow { font-size: 11px; color: var(--text-dim); text-align: center; font-weight: 700; text-transform: uppercase; }
    .cal .cell { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 8px; min-height: 78px; padding: 5px; }
    .cal .cell.fora { opacity: .35; }
    .cal .cell.hoje { border-color: var(--accent); }
    .cal .dnum { font-size: 11px; color: var(--text-dim); }
    .cal .ev { font-size: 10.5px; padding: 2px 5px; border-radius: 5px; margin-top: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; place-items: center; z-index: 200; padding: 16px; }
    .overlay.open { display: grid; }
    .modal { width: min(96vw, 620px); max-height: 92vh; overflow-y: auto; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); }
    .modal-h { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg-elev); }
    .modal-h strong { font-size: 15px; }
    .modal-b { padding: 16px 18px; }
    .modal-b label { display: block; font-size: 12px; color: var(--text-dim); font-weight: 600; margin: 12px 0 5px; }
    .modal-b input, .modal-b textarea, .modal-b select { width: 100%; background: var(--bg-elev-2); color: var(--text); border: 1px solid var(--line); border-radius: 9px; padding: 10px 12px; font-size: 14px; }
    .modal-b textarea { min-height: 70px; resize: vertical; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .resp-pick { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 6px; }
    .resp-opt { font-size: 12px; padding: 6px 11px; border-radius: 20px; border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--text-dim); cursor: pointer; }
    .resp-opt.on { background: rgba(31,191,99,.15); border-color: var(--accent); color: var(--text); }
    .modal-f { display: flex; gap: 10px; justify-content: space-between; padding: 14px 18px; border-top: 1px solid var(--line); }
    .icon-btn { background: transparent; border: none; color: var(--text-dim); font-size: 18px; cursor: pointer; }
    .empty { text-align: center; color: var(--text-dim); padding: 40px 20px; }
    .req { color: #ef6c60; }
    /* Mobile: cabeçalho e toolbar quebram em linhas */
    @media (max-width: 720px) {
      .topbar2 { flex-wrap: wrap; gap: 8px 10px; padding: 10px 12px; }
      .topbar2 .spacer { display: none; }
      .topbar2 .brand { flex: 1 1 auto; min-width: 0; }
      .topbar2 .brand small { display: none; }
      .wrap { padding: 12px 12px 60px; }
      .views { flex: 1 1 100%; overflow-x: auto; }
      .toolbar .filtro { flex: 1 1 auto; }
      #btn-nova { flex: 1 1 100%; justify-content: center; }
      .resumo .stat { min-width: 0; flex: 1 1 calc(50% - 5px); }
    }
  </style>
</head>
<body>
  <header class="topbar2">
    <a class="brand" href="/" style="text-decoration:none;color:inherit">
      <img src="/assets/bzr-mark.svg" alt="BzR" />
      <strong>BzR <span class="accent">Demandas</span><small>Gestão de projeto · PD / CTM</small></strong>
    </a>
    <div class="spacer"></div>
    <a class="navlink" href="/">Território</a>
    <a class="navlink" href="/bci/">Cadastro (BCI)</a>
    <a class="navlink" href="/os/">Ordens de Serviço</a>
    <div class="userchip" id="userchip"></div>
    <button class="btn2" id="btn-logout" title="Sair">Sair</button>
  </header>

  <div class="wrap">
    <div class="resumo" id="resumo"></div>

    <div class="toolbar">
      <div class="views" id="views">
        <button data-view="kanban" class="on">▦ Quadro</button>
        <button data-view="lista">☰ Lista</button>
        <button data-view="minhas">👤 Minhas</button>
        <button data-view="calendario">🗓 Calendário</button>
      </div>
      <select class="filtro" id="f-equipe"><option value="">Todas as equipes</option><option>PD</option><option>CTM</option></select>
      <select class="filtro" id="f-prioridade">
        <option value="">Toda prioridade</option>
        <option value="urgente">Urgente</option><option value="alta">Alta</option>
        <option value="media">Média</option><option value="baixa">Baixa</option>
      </select>
      <div class="spacer"></div>
      <button class="btn2 primary" id="btn-nova">＋ Nova demanda</button>
    </div>

    <div id="view"></div>
  </div>

  <!-- Modal criar/editar -->
  <div class="overlay" id="overlay">
    <div class="modal">
      <div class="modal-h">
        <strong id="modal-titulo">Nova demanda</strong>
        <button class="icon-btn" id="modal-fechar">✕</button>
      </div>
      <div class="modal-b">
        <label>Título <span class="req">*</span></label>
        <input id="m-titulo" placeholder="Ex.: Coleta de campo — Quadra 12" />
        <label>Descrição</label>
        <textarea id="m-descricao" placeholder="Detalhes da demanda…"></textarea>
        <div class="grid2">
          <div>
            <label>Equipe</label>
            <input id="m-equipe" list="equipes" placeholder="PD, CTM…" />
            <datalist id="equipes"><option>PD</option><option>CTM</option></datalist>
          </div>
          <div>
            <label>Prioridade</label>
            <select id="m-prioridade">
              <option value="baixa">Baixa</option><option value="media" selected>Média</option>
              <option value="alta">Alta</option><option value="urgente">Urgente</option>
            </select>
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>Status</label>
            <select id="m-status">
              <option value="pendente">Pendente</option><option value="em_andamento">Em andamento</option>
              <option value="concluida">Concluída</option><option value="cancelada">Cancelada</option>
            </select>
          </div>
          <div>
            <label>Prazo</label>
            <input type="date" id="m-prazo" />
          </div>
        </div>
        <div class="grid2">
          <div>
            <label>Município</label>
            <input id="m-municipio" placeholder="Ex.: João Pessoa" />
          </div>
          <div>
            <label>Lote / Bairro (opcional)</label>
            <input id="m-lote" placeholder="Bairro ou código do lote" />
          </div>
        </div>
        <label>Responsáveis</label>
        <div class="resp-pick" id="m-resp"></div>
      </div>
      <div class="modal-f">
        <button class="btn2" id="m-excluir" style="color:#ef6c60;border-color:rgba(192,57,43,.4)">Excluir</button>
        <div style="display:flex;gap:10px">
          <button class="btn2" id="m-cancelar">Cancelar</button>
          <button class="btn2 primary" id="m-salvar">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/demandas/app.js"></script>
</body>
</html>
