<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/assets/bzr-mark.svg" type="image/svg+xml" />
  <title>BzR — Cadastro Imobiliário (BCI)</title>
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    html, body { height: 100%; }
    body { overflow: hidden; display: flex; flex-direction: column; }
    .topbar2 { flex: 0 0 auto; display: flex; align-items: center; gap: 12px; padding: 11px 18px; background: var(--bg-elev); border-bottom: 1px solid var(--line); z-index: 60; }
    .topbar2 .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
    .topbar2 .brand img { width: 32px; height: 32px; }
    .topbar2 .brand strong { font-size: 15px; font-weight: 800; }
    .topbar2 .brand .accent { color: var(--brand); }
    .topbar2 .brand small { display: block; color: var(--text-dim); font-size: 10.5px; }
    .spacer { flex: 1; }
    .fieldm { display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: var(--text-dim); }
    .fieldm select { background: var(--bg-elev-2); color: var(--text); border: 1px solid var(--line); border-radius: 9px; padding: 7px 10px; font-size: 13px; min-width: 160px; }
    .navlink { color: var(--text-dim); text-decoration: none; font-size: 13px; font-weight: 600; padding: 7px 10px; border-radius: 8px; }
    .navlink:hover { background: var(--bg-elev-2); color: var(--text); }
    .btn2 { display: inline-flex; align-items: center; gap: 7px; cursor: pointer; border: 1px solid var(--line); background: var(--bg-elev-2); color: var(--text); border-radius: 9px; padding: 8px 12px; font-size: 13px; font-weight: 600; text-decoration: none; }
    .btn2:hover { border-color: var(--accent); }
    .btn2.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: var(--brand-ink); border-color: transparent; font-weight: 700; }

    /* Layout principal: mapa grande à esquerda, painel/lista à direita */
    .main { flex: 1 1 auto; display: grid; grid-template-columns: minmax(0, 1fr) 400px; min-height: 0; }
    #mapa { height: 100%; width: 100%; background: #0a1018; }
    .maparea { position: relative; min-width: 0; }
    .map-legenda { position: absolute; left: 12px; bottom: 12px; z-index: 500; background: rgba(10,15,12,.85); backdrop-filter: blur(6px); border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 11.5px; color: var(--text-dim); max-width: 70%; }
    .map-legenda span { display: inline-flex; align-items: center; gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 3px; display: inline-block; border: 1px solid rgba(255,255,255,.15); }

    /* Painel lateral (lista) */
    .side { border-left: 1px solid var(--line); background: var(--bg); display: flex; flex-direction: column; min-height: 0; }
    .resumo { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 12px; border-bottom: 1px solid var(--line); }
    .stat { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 10px; padding: 8px 11px; cursor: pointer; }
    .stat.on { border-color: var(--accent); }
    .stat .v { font-size: 19px; font-weight: 800; }
    .stat .l { font-size: 10.5px; color: var(--text-dim); }
    .stat.total { grid-column: 1 / -1; }
    .stat.enviado .v { color: #7fb5f0; } .stat.aprovado .v { color: #6ee7a8; }
    .stat.ajuste .v { color: #f6a94a; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px; border-bottom: 1px solid var(--line); }
    .toolbar input, .toolbar select { background: var(--bg-elev); color: var(--text); border: 1px solid var(--line); border-radius: 9px; padding: 8px 10px; font-size: 13px; }
    .toolbar input { flex: 1; min-width: 120px; }
    .chk { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
    .lista { flex: 1 1 auto; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .bcard { background: var(--bg-elev); border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; cursor: pointer; }
    .bcard:hover { border-color: var(--accent); }
    .bcard.hl { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(31,191,99,.25); }
    .bcard .top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .bcard .insc { font-family: ui-monospace, monospace; font-weight: 800; font-size: 13.5px; }
    .bcard .loc { font-size: 11.5px; color: var(--text-dim); margin-bottom: 7px; }
    .bcard .foot { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; font-size: 11px; color: var(--text-dim); }
    .st-pill { font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; letter-spacing: .3px; white-space: nowrap; }
    .st-rascunho { background: var(--bg-elev-2); color: var(--text-dim); }
    .st-enviado { background: rgba(59,130,246,.16); color: #7fb5f0; }
    .st-aprovado { background: rgba(31,191,99,.15); color: #6ee7a8; }
    .st-rejeitado { background: rgba(192,57,43,.18); color: #ef6c60; }
    .st-arquivado { background: rgba(148,163,184,.16); color: #cbd5e1; }
    .tag-aj { background: rgba(245,169,74,.16); color: #f6a94a; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; }
    .empty { text-align: center; color: var(--text-dim); padding: 30px 16px; font-size: 13px; }
    .loading { padding: 20px; text-align: center; color: var(--text-dim); font-size: 13px; }
    .leaflet-popup-content-wrapper { background: var(--bg-elev); color: var(--text); border: 1px solid var(--line); }
    .leaflet-popup-tip { background: var(--bg-elev); }
    .leaflet-popup-content a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .leaflet-control-zoom a { background: var(--bg-elev) !important; color: var(--text) !important; border-color: var(--line) !important; }
    .leaflet-control-layers { background: var(--bg-elev) !important; color: var(--text) !important; border: 1px solid var(--line) !important; border-radius: 10px !important; box-shadow: var(--shadow) !important; }
    .leaflet-control-layers-toggle { filter: invert(1) hue-rotate(180deg); }
    .leaflet-control-layers-expanded { padding: 8px 12px !important; font-size: 13px; }
    .leaflet-control-layers label { margin: 3px 0; }
    .leaflet-control-layers-selector { accent-color: var(--accent); margin-right: 6px; }
    .leaflet-control-attribution { background: rgba(10,15,12,.8) !important; color: var(--text-dim) !important; }
    .leaflet-control-attribution a { color: var(--accent-2) !important; }

    /* Mobile: empilha (mapa em cima, lista embaixo) */
    @media (max-width: 900px) {
      body { overflow: auto; }
      .main { grid-template-columns: 1fr; height: auto; }
      .maparea { height: 52vh; }
      .side { border-left: none; border-top: 1px solid var(--line); }
      .lista { overflow: visible; }
    }
  </style>
</head>
<body>
  <header class="topbar2">
    <a class="brand" href="/"><img src="/assets/bzr-mark.svg" alt="BzR" /><strong>BzR <span class="accent">Cadastro (BCI)</span><small>Boletim de Cadastro Imobiliário</small></strong></a>
    <label class="fieldm"><span>Município</span><select id="municipio"></select></label>
    <div class="spacer"></div>
    <a class="navlink" href="/">Território</a>
    <a class="navlink" href="/demandas/">Demandas</a>
    <a class="btn2 primary" id="btn-novo" href="/bci/ficha.html">＋ Novo BCI</a>
  </header>

  <div class="main">
    <div class="maparea">
      <div id="mapa"></div>
      <div class="map-legenda">
        <span><i class="dot" style="background:#2A362E"></i>Sem coleta</span>
        <span><i class="dot" style="background:#9AA6A0"></i>Rascunho</span>
        <span><i class="dot" style="background:#7fb5f0"></i>Enviado</span>
        <span><i class="dot" style="background:#1FBF63"></i>Aprovado</span>
        <span><i class="dot" style="background:#ef6c60"></i>Rejeitado</span>
        <span><i class="dot" style="background:#f6a94a"></i>Ajuste geom.</span>
      </div>
    </div>

    <aside class="side">
      <div class="resumo" id="resumo"></div>
      <div class="toolbar">
        <input id="q" placeholder="Buscar inscrição…" />
        <select id="f-status">
          <option value="">Todos</option>
          <option value="rascunho">Rascunho</option><option value="enviado">Enviado</option>
          <option value="aprovado">Aprovado</option><option value="rejeitado">Rejeitado</option><option value="arquivado">Arquivado</option>
        </select>
        <label class="chk"><input type="checkbox" id="f-ajuste" /> Só ajustes</label>
      </div>
      <div class="lista" id="lista"><div class="loading">Carregando…</div></div>
    </aside>
  </div>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/bci/app.js"></script>
</body>
</html>
